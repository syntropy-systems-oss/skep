name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      # Publishing to npm is intentionally NOT wired up yet. When ready to ship, add a
      # step gated on `steps.<id>.outputs.release_created` that runs `npm publish`.
