name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # The remaining steps run only when a release was actually cut.
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      # Title the release with its bee codename from codenames.json.
      - name: Name the release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.release.outputs.version }}"
          tag="${{ steps.release.outputs.tag_name }}"
          name=$(node -e "try{process.stdout.write((require('./codenames.json')['$version'])||'')}catch{process.stdout.write('')}")
          if [ -n "$name" ]; then
            echo "Naming $tag → \"$name\""
            gh release edit "$tag" --title "$tag — $name"
          else
            echo "No codename for $version in codenames.json (skipping)."
          fi

      # Publish to npm via OIDC trusted publishing — no token; provenance is automatic.
      # (Requires the trusted publisher configured on npm for this repo + this workflow file.)
      - uses: actions/setup-node@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Publish to npm
        if: ${{ steps.release.outputs.release_created }}
        run: |
          npm install -g npm@latest   # OIDC trusted publishing needs npm >= 11.5
          npm ci --ignore-scripts
          npm publish
